        .shape:nth-child(1) {

            height: 600px;

            top: -10%;
            right: -5%;

        // ----- 3. قسم الإحصائيات الذكي وجافا سكريبت الأرقام (Stats) -----
        function Stats() {
            const [counts, setCounts] = useState({ projects: 0, clients: 0, offices: 0, awards: 0 });
            const statsRef = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => { if (entry.isIntersecting) animateCounts(); });
                }, { threshold: 0.2 });
                if (statsRef.current) observer.observe(statsRef.current);
                return () => observer.disconnect();
            }, []);

            const animateCounts = () => {
                const targets = { projects: 1250, clients: 870, offices: 15, awards: 42 };
                const duration = 2500, steps = 60;
                let step = 0;
                const interval = duration / steps;
                const timer = setInterval(() => {
                    step++;
                    const progress = step / steps;
                    setCounts({
                        projects: Math.round(progress * targets.projects),
                        clients: Math.round(progress * targets.clients),
                        offices: Math.round(progress * targets.offices),
                        awards: Math.round(progress * targets.awards),
                    });
                    if (step >= steps) { 
                        clearInterval(timer);
                        setCounts(targets); 
                    }
                }, interval);
            };

            return (
                <section ref={statsRef} className="py-24 bg-[#0a0f1d] border-y border-[#fbbf24]/10 relative z-10">
                    <div className="container mx-auto px-4 md:px-8 grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                        {[
                            { label: 'مشروع استثماري منجز', value: counts.projects, color: 'text-[#fbbf24]' },
                            { label: 'عميل شريك معنا', value: counts.clients, color: 'text-[#38bdf8]' },
                            { label: 'مكاتب دولية وإقليمية', value: counts.offices, color: 'text-[#a78bfa]' },
                            { label: 'جائزة حوكمة وتميز', value: counts.awards, color: 'text-[#34d399]' }
                        ].map((item, i) => (
                            <div key={i} className="p-8 rounded-3xl glass border border-[#fbbf24]/5 hover:border-[#fbbf24]/20 transition-all duration-300">
                                <h3 className={`text-4xl md:text-6xl font-black tracking-tight ${item.color}`}>{item.value}+</h3>
                                <div className="w-10 h-0.5 bg-slate-700 mx-auto my-3"></div>
                                <p className="text-[#94a3b8] text-sm md:text-base font-bold">{item.label}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

                                            <li className="flex items-center gap-3"><span className="text-[#fbbf24] text-lg">✓</span> استخراج رخصة الاستثمار الرسمية من وزارة الاستثمار.</li>
                                            <li className="flex items-center gap-3"><span className="text-[#fbbf24] text-lg">✓</span> تأسيس فرعين دوليين معتمدين في (أمريكا ورواندا).</li>
                                            <li className="flex items-center gap-3"><span className="text-[#fbbf24] text-lg">✓</span> الاستحواذ القانوني الشامل على شركة بريطانية معترف بها.</li>

        function App() {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });

                return () => observer.disconnect();
